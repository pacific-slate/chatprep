<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Two short walk-throughs to get more out of AI: personalize ChatGPT/Claude/Gemini, or install the AI tools that live on your computer (Claude Code, Gemini CLI, Codex). No accounts. No tracking.">
  <meta name="color-scheme" content="light dark">
  <title>ChatPrep — Get more out of AI</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body data-app="router">

  <a class="skip-link" href="#main">Skip to main content</a>

  <header class="site-header">
    <a href="/" class="site-title" aria-label="ChatPrep home">
      <span class="site-title__mark" aria-hidden="true">▣</span>
      <span class="site-title__text">ChatPrep</span>
    </a>
    <p class="site-tagline" data-copy="site.footer_privacy">Nothing you type leaves your browser. No accounts. No tracking.</p>
  </header>

  <main id="main" class="router">

    <section class="router__intro">
      <h1 class="router__heading" data-copy="routing.heading">Get more out of AI.</h1>
      <p class="router__subhead" data-copy="routing.subhead"></p>
    </section>

    <div class="router__cards">

      <a class="router-card" data-card="personalize" href="/personalize">
        <p class="router-card__kicker" data-copy="routing.card1.kicker"></p>
        <h2 class="router-card__heading" data-copy="routing.card1.heading"></h2>
        <p class="router-card__body" data-copy="routing.card1.body"></p>
        <span class="router-card__cta" data-copy="routing.card1.cta">Personalize my AI</span>
      </a>

      <a class="router-card" data-card="supercharge" href="/supercharge">
        <p class="router-card__kicker" data-copy="routing.card2.kicker"></p>
        <h2 class="router-card__heading" data-copy="routing.card2.heading"></h2>
        <p class="router-card__body" data-copy="routing.card2.body"></p>
        <span class="router-card__cta" data-copy="routing.card2.cta">Show me how</span>
      </a>

    </div>

  </main>

  <footer class="site-footer">
    <p class="site-footer__line" data-copy="footer.made_by">Made by a person, not a company.</p>
    <ul class="site-footer__links">
      <li><a href="/about" data-copy="footer.about">About</a></li>
      <li><a href="/privacy" data-copy="footer.privacy">Privacy</a></li>
      <li><a href="https://github.com/pacific-slate/chatprep" rel="noopener" data-copy="footer.github">View source on GitHub</a></li>
    </ul>
  </footer>

  <script src="app.js" type="module"></script>
</body>
</html>
